        /* --- General page styling --- */
body {
    margin: 0;

    color: #1b5e20;
}

/* --- Main Section --- */
section {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    padding: 20px;
}

#btt {
    text-align: center;
    max-width: 400px;
    width: 100%;
    background: white;
    padding: 30px 20px;
    border-radius: 12px;

}

#btt h2 {
    margin-bottom: 25px;
    font-size: 24px;
    color: #1b5e20;
}

/* Buttons container */
.method-select {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Button styling */
.method-select button {
    padding: 15px 20px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
}

/* WhatsApp button */
.method-select button:first-child {
    background-color:#1b5e20;; /* WhatsApp green */
    color: white;
}

/* Email button */
.method-select button:last-child {
    background-color: #1b5e20;
    color: white;
}

/* Hover effect */
.method-select button:hover {
    opacity: 0.85;
}

/* Links inside buttons */
.method-select button a {
    text-decoration: none;
    color: inherit;
    display: block;
    width: 100%;
}
    </style>
